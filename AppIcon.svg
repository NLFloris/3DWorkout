<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- iOS squircle clip -->
    <clipPath id="sq">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>

    <!-- Trail gradient: warm amber at trailhead (bottom) → vivid red at summit (top) -->
    <linearGradient id="tg" gradientUnits="userSpaceOnUse"
                    x1="512" y1="870" x2="512" y2="260">
      <stop offset="0%"   stop-color="#FFB832"/>
      <stop offset="45%"  stop-color="#FF5020"/>
      <stop offset="100%" stop-color="#D20012"/>
    </linearGradient>

    <!-- Dark forest-green background -->
    <radialGradient id="bg" cx="50%" cy="55%" r="72%">
      <stop offset="0%"   stop-color="#142018"/>
      <stop offset="55%"  stop-color="#0C1610"/>
      <stop offset="100%" stop-color="#070D08"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="b62" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="62"/>
    </filter>
    <filter id="b24" x="-32%" y="-32%" width="164%" height="164%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="b10" x="-16%" y="-16%" width="132%" height="132%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>

  </defs>

  <g clip-path="url(#sq)">

    <!-- ── Background ── -->
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Very faint topographic contour ellipses suggesting terrain -->
    <g fill="none" stroke="#2E5A34" stroke-width="1">
      <ellipse cx="512" cy="510" rx="165" ry="110" stroke-opacity="0.18"/>
      <ellipse cx="512" cy="510" rx="275" ry="195" stroke-opacity="0.12"/>
      <ellipse cx="512" cy="510" rx="388" ry="285" stroke-opacity="0.08"/>
      <ellipse cx="512" cy="510" rx="495" ry="375" stroke-opacity="0.05"/>
    </g>

    <!-- Subtle warm ambient glow at bottom (trailhead) -->
    <ellipse cx="340" cy="860" rx="220" ry="120" fill="#FF8020" fill-opacity="0.07"/>
    <!-- Subtle cool glow at top (summit) -->
    <ellipse cx="690" cy="260" rx="160" ry="90" fill="#FF2010" fill-opacity="0.08"/>

    <!-- ── Switchback Trail ──
         5 traverses with 4 hairpin turns.

         Traverses (left↔right zigzag going up):
           T1: (155, 860) → right  → (855, 820)   trailhead stretch
           HP-R1                    → (855, 694)   tight right hairpin
           T2: (855, 694) → left   → (155, 694)
           HP-L1                    → (155, 568)   tight left hairpin
           T3: (155, 568) → right  → (855, 555)
           HP-R2                    → (855, 430)   tight right hairpin
           T4: (855, 430) → left   → (155, 430)
           HP-L2                    → (155, 305)   tight left hairpin
           T5: (155, 305) → right  → (855, 272)   summit approach (angled up)
    -->

    <!-- Outer bloom layer -->
    <path fill="none" stroke="#FF7828" stroke-width="8" stroke-opacity="0.38"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#b62)"
          d="M 155,860
             C 370,848 640,830 855,820
             C 948,820 948,694 855,694
             C 625,690 380,687 155,694
             C 62,694 62,568 155,568
             C 378,562 635,553 855,555
             C 948,555 948,430 855,430
             C 622,426 378,422 155,430
             C 62,430 62,305 155,305
             C 378,298 642,288 855,272"/>

    <!-- Medium glow -->
    <path fill="none" stroke="url(#tg)" stroke-width="38" stroke-opacity="0.38"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#b24)"
          d="M 155,860
             C 370,848 640,830 855,820
             C 948,820 948,694 855,694
             C 625,690 380,687 155,694
             C 62,694 62,568 155,568
             C 378,562 635,553 855,555
             C 948,555 948,430 855,430
             C 622,426 378,422 155,430
             C 62,430 62,305 155,305
             C 378,298 642,288 855,272"/>

    <!-- Tight inner glow -->
    <path fill="none" stroke="url(#tg)" stroke-width="22" stroke-opacity="0.58"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#b10)"
          d="M 155,860
             C 370,848 640,830 855,820
             C 948,820 948,694 855,694
             C 625,690 380,687 155,694
             C 62,694 62,568 155,568
             C 378,562 635,553 855,555
             C 948,555 948,430 855,430
             C 622,426 378,422 155,430
             C 62,430 62,305 155,305
             C 378,298 642,288 855,272"/>

    <!-- Crisp main trail line -->
    <path fill="none" stroke="url(#tg)" stroke-width="15"
          stroke-linecap="round" stroke-linejoin="round"
          d="M 155,860
             C 370,848 640,830 855,820
             C 948,820 948,694 855,694
             C 625,690 380,687 155,694
             C 62,694 62,568 155,568
             C 378,562 635,553 855,555
             C 948,555 948,430 855,430
             C 622,426 378,422 155,430
             C 62,430 62,305 155,305
             C 378,298 642,288 855,272"/>

    <!-- ── Hairpin apex dots ──
         Placed at the outermost point of each tight turn. -->

    <!-- HP-R1 apex: x ≈ 940, y ≈ 757 -->
    <circle cx="940" cy="757" r="24" fill="#FF8830" fill-opacity="0.20" filter="url(#b10)"/>
    <circle cx="940" cy="757" r="10" fill="#FF8830"/>

    <!-- HP-L1 apex: x ≈ 68, y ≈ 631 -->
    <circle cx="68" cy="631" r="24" fill="#FF8030" fill-opacity="0.20" filter="url(#b10)"/>
    <circle cx="68" cy="631" r="10" fill="#FF8030"/>

    <!-- HP-R2 apex: x ≈ 940, y ≈ 492 -->
    <circle cx="940" cy="492" r="24" fill="#FF5820" fill-opacity="0.20" filter="url(#b10)"/>
    <circle cx="940" cy="492" r="10" fill="#FF5820"/>

    <!-- HP-L2 apex: x ≈ 68, y ≈ 367 -->
    <circle cx="68" cy="367" r="24" fill="#FF4820" fill-opacity="0.20" filter="url(#b10)"/>
    <circle cx="68" cy="367" r="10" fill="#FF4820"/>

    <!-- ── Trailhead marker (start) ──
         Bottom-left: (155, 860) -->
    <circle cx="155" cy="860" r="48" fill="#FFB832" fill-opacity="0.13" filter="url(#b10)"/>
    <circle cx="155" cy="860" r="23" fill="#FFB832"/>
    <circle cx="155" cy="860" r="10" fill="white" fill-opacity="0.95"/>

    <!-- ── Summit marker (end) ──
         Top-right: (855, 272) — larger, distinct red ring -->
    <circle cx="855" cy="272" r="42" fill="#D20012" fill-opacity="0.18" filter="url(#b10)"/>
    <circle cx="855" cy="272" r="20" fill="#E8001C"/>
    <circle cx="855" cy="272" r="8"  fill="white" fill-opacity="0.95"/>

  </g>

</svg>
